/* ---- DXF保存（赤連続線を SEKISAN レイヤへLINEとして追記） ---- */
function rowsWithOffsets(text){
  const rows=[]; let pos=0;
  while(pos<text.length){
    const nl=text.indexOf('\n',pos);
    if(nl<0){
      let line=text.slice(pos); if(line.endsWith('\r')) line=line.slice(0,-1);
      if(line.length) rows.push({text:line,start:pos});
      break;
    }
    let line=text.slice(pos,nl); if(line.endsWith('\r')) line=line.slice(0,-1);
    rows.push({text:line,start:pos});
    pos=nl+1;
  }
  return rows;
}
function dxfNl(bytes){
  for(let i=0;i<bytes.length-1;i++) if(bytes[i]===13 && bytes[i+1]===10) return '\r\n';
  return '\n';
}
function asciiBytes(s){ return dxfTextBytes(s); }
function dxfTextBytes(s){
  const cp932={
    '周':[0x8e,0xfc],
    '長':[0x92,0xb7],
    '面':[0x96,0xca],
    '積':[0x90,0xcf],
    '㎡':[0x87,0x75]
  };
  const out=[];
  for(const ch of String(s)){
    if(cp932[ch]) out.push(...cp932[ch]);
    else {
      const c=ch.charCodeAt(0);
      out.push(c<=0x7f ? c : 0x3f);
    }
  }
  return new Uint8Array(out);
}
function insertBytes(bytes, offset, text){
  const ins=(text instanceof Uint8Array) ? text : asciiBytes(text);
  const out=new Uint8Array(bytes.length+ins.length);
  out.set(bytes.slice(0,offset),0);
  out.set(ins,offset);
  out.set(bytes.slice(offset),offset+ins.length);
  return out;
}
function findLayerTableEnd(rows){
  for(let i=0;i<rows.length-3;i++){
    if(rows[i].text.trim()==='0' && rows[i+1].text.trim()==='TABLE' && rows[i+2].text.trim()==='2' && rows[i+3].text.trim().toUpperCase()==='LAYER'){
      for(let j=i+4;j<rows.length-1;j++){
        if(rows[j].text.trim()==='0' && rows[j+1].text.trim()==='ENDTAB') return rows[j].start;
      }
    }
  }
  return -1;
}
function hasLayer(rows, name){
  const target=name.toUpperCase();
  for(let i=0;i<rows.length-1;i++){
    if(rows[i].text.trim()==='0' && rows[i+1].text.trim()==='LAYER'){
      for(let j=i+2;j<rows.length-1 && rows[j].text.trim()!=='0';j++){
        if(rows[j].text.trim()==='2' && rows[j+1].text.trim().toUpperCase()===target) return true;
      }
    }
  }
  return false;
}
function findEntitiesEnd(rows){
  for(let i=0;i<rows.length-3;i++){
    if(rows[i].text.trim()==='0' && rows[i+1].text.trim()==='SECTION' && rows[i+2].text.trim()==='2' && rows[i+3].text.trim().toUpperCase()==='ENTITIES'){
      for(let j=i+4;j<rows.length-1;j++){
        if(rows[j].text.trim()==='0' && rows[j+1].text.trim()==='ENDSEC') return rows[j].start;
      }
    }
  }
  return -1;
}
function dxfNum(v){ return Number.isFinite(v) ? String(Math.round(v*1000000)/1000000) : '0'; }
function layerRecord(name,aci,nl){
  return [
    '0','LAYER',
    '2',name,
    '70','0',
    '62',aci,
    '6','CONTINUOUS'
  ].join(nl)+nl;
}
function buildLayerInsert(rows,nl){
  let out='';
  if(!hasLayer(rows, SEKISAN_LAYER)) out += layerRecord(SEKISAN_LAYER,'1',nl);
  if(measureLabels.length && !hasLayer(rows, MOJI_LAYER)) out += layerRecord(MOJI_LAYER,MOJI_ACI,nl);
  if(dims.length && !hasLayer(rows, SUNPOU_LAYER)) out += layerRecord(SUNPOU_LAYER,SUNPOU_ACI,nl);
  if(DOC && DOC.moji.some(e=>e.singleLineLabel) && !hasLayer(rows, LINE_LAYER)) out += layerRecord(LINE_LAYER,LINE_ACI,nl);
  return out;
}
function buildMeasureTextDxfRecords(nl){
  if(!measureLabels.length) return '';
  const rec=[];
  measureLabels.forEach(label=>{
    (label.entities||[]).forEach(e=>{
      rec.push([
        '0','TEXT',
        '8',MOJI_LAYER,
        '62',MOJI_ACI,
        '7','Gothic',
        '10',dxfNum(e.x1),
        '20',dxfNum(e.y1),
        '30','0.0',
        '40',dxfNum(e.sy||200),
        '1',e.text,
        '50',dxfNum(e.kakudo||0),
        '72',String(e.halign==null ? 1 : e.halign),
        '73','2',
        '11',dxfNum(e.x1),
        '21',dxfNum(e.y1),
        '31','0.0'
      ].join(nl));
    });
  });
  return rec.join(nl)+nl;
}
function buildDimDxfRecords(nl){
  if(!dims.length) return '';
  const rec=[];
  dims.forEach(d=>{
    // 寸法線の端点を計算（drawDimと同じロジック）
    let a,b,e1a,e1b,e2a,e2b; const p1=d.p1,p2=d.p2;
    if(d.mode==='xy'){
      if(d.axis==='x'){ a={x:p1.x,y:d.level}; b={x:p2.x,y:d.level}; e1a=p1; e1b={x:p1.x,y:d.level}; e2a=p2; e2b={x:p2.x,y:d.level}; }
      else { a={x:d.level,y:p1.y}; b={x:d.level,y:p2.y}; e1a=p1; e1b={x:d.level,y:p1.y}; e2a=p2; e2b={x:d.level,y:p2.y}; }
    } else {
      const dx=p2.x-p1.x, dy=p2.y-p1.y, L=Math.hypot(dx,dy)||1, nx=-dy/L, ny=dx/L, o=d.off;
      a={x:p1.x+nx*o,y:p1.y+ny*o}; b={x:p2.x+nx*o,y:p2.y+ny*o}; e1a=p1; e1b=a; e2a=p2; e2b=b;
    }
    // 補助線1
    rec.push(['0','LINE','8',SUNPOU_LAYER,'62',SUNPOU_ACI,'6','CONTINUOUS',
      '10',dxfNum(e1a.x),'20',dxfNum(e1a.y),'30','0.0',
      '11',dxfNum(e1b.x),'21',dxfNum(e1b.y),'31','0.0'].join(nl));
    // 補助線2
    rec.push(['0','LINE','8',SUNPOU_LAYER,'62',SUNPOU_ACI,'6','CONTINUOUS',
      '10',dxfNum(e2a.x),'20',dxfNum(e2a.y),'30','0.0',
      '11',dxfNum(e2b.x),'21',dxfNum(e2b.y),'31','0.0'].join(nl));
    // 寸法線
    rec.push(['0','LINE','8',SUNPOU_LAYER,'62',SUNPOU_ACI,'6','CONTINUOUS',
      '10',dxfNum(a.x),'20',dxfNum(a.y),'30','0.0',
      '11',dxfNum(b.x),'21',dxfNum(b.y),'31','0.0'].join(nl));
    // 寸法値テキスト（高さは寸法数値の高さ(h)に合わせる。未検出時のみ従来固定200）
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const ang=Math.atan2(b.y-a.y, b.x-a.x)*180/Math.PI;
    const textH=dimTextH>0 ? dimTextH : 200;
    rec.push(['0','TEXT','8',SUNPOU_LAYER,'62',SUNPOU_ACI,'7','Gothic',
      '10',dxfNum(mx),'20',dxfNum(my),'30','0.0',
      '40',dxfNum(textH),
      '1',fmtLen(d.value),
      '50',dxfNum(ang),
      '72','1','73','2',
      '11',dxfNum(mx),'21',dxfNum(my),'31','0.0'].join(nl));
  });
  return rec.join(nl)+nl;
}
function buildSingleLineLabelDxfRecords(nl){
  if(!DOC) return '';
  const labels=DOC.moji.filter(e=>e.singleLineLabel);
  if(!labels.length) return '';
  const rec=[];
  labels.forEach(e=>{
    rec.push(['0','TEXT','8',LINE_LAYER,'62',LINE_ACI,'7','Gothic',
      '10',dxfNum(e.x1),'20',dxfNum(e.y1),'30','0.0',
      '40',dxfNum(e.sy||100),'1',e.text,'50',dxfNum(e.kakudo||0),
      '72',String(e.halign==null?1:e.halign),'73','2',
      '11',dxfNum(e.x1),'21',dxfNum(e.y1),'31','0.0'].join(nl));
  });
  return rec.join(nl)+nl;
}
function buildSekisanDxfBytes(){
  if(!sourceBytes) throw new Error('保存元のDXFがありません。');
  let bytes=sourceBytes;
  const nl=dxfNl(bytes);
  let text=new TextDecoder('latin1').decode(bytes);
  let rows=rowsWithOffsets(text);
  const layerAt=findLayerTableEnd(rows);
  if(layerAt>=0){
    const layerInsert=buildLayerInsert(rows,nl);
    if(layerInsert) bytes=insertBytes(bytes, layerAt, layerInsert);
  }
  text=new TextDecoder('latin1').decode(bytes);
  rows=rowsWithOffsets(text);
  const entAt=findEntitiesEnd(rows);
  if(entAt<0) throw new Error('DXFのENTITIESセクションが見つかりません。');
  let ents='';
  if(userLines.length){
    ents+=userLines.map(line=>[
      '0','LINE',
      '8',SEKISAN_LAYER,
      '62','1',
      '6','CONTINUOUS',
      '10',dxfNum(line.p1.x),
      '20',dxfNum(line.p1.y),
      '30','0.0',
      '11',dxfNum(line.p2.x),
      '21',dxfNum(line.p2.y),
      '31','0.0'
    ].join(nl)).join(nl)+nl;
  }
  ents+=buildMeasureTextDxfRecords(nl);
  ents+=buildDimDxfRecords(nl);
  ents+=buildSingleLineLabelDxfRecords(nl);
  return insertBytes(bytes, entAt, ents);
}
function dxfSaveName(){
  const base=(sourceName||document.getElementById('fname').textContent||'drawing.dxf').replace(/\.[^.]*$/,'') || 'drawing';
  return `${base}_SEKISAN.dxf`;
}
async function saveDXF(){
  try{
    const bytes=buildSekisanDxfBytes();
    const blob=new Blob([bytes],{type:'application/dxf'});
    const name=dxfSaveName();
    if(window.showSaveFilePicker){

  }
}

/* ---- PDF保存（ブラウザの印刷機能を利用。送信先で「PDFに保存」を選択） ---- */
function pdfName(){
  const fn=(document.getElementById('fname').textContent||'drawing').trim();
  const base=fn.replace(/\.[^.]*$/,'') || 'drawing';
  const d=new Date();
  const yy=String(d.getFullYear()).slice(-2), mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${base}_${yy}${mm}${dd}.pdf`;          // yymmdd
}
function dataURLtoBytes(durl){
  const bin=atob(durl.split(',')[1]); const a=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a;
}
function buildPDF(jpeg, iw, ih){                 // 1ページにJPEG画像1枚を埋め込む最小PDF
  const A4=[595.28,841.89], landscape=iw>=ih;
  const pw=landscape?A4[1]:A4[0], ph=landscape?A4[0]:A4[1], m=18;
  const s=Math.min((pw-2*m)/iw,(ph-2*m)/ih), dw=iw*s, dh=ih*s, dx=(pw-dw)/2, dy=(ph-dh)/2;
  const enc=new TextEncoder(); const parts=[]; let length=0; const off=[];
  const add=u=>{ const a=(typeof u==='string')?enc.encode(u):u; parts.push(a); length+=a.length; };
  const startObj=n=>{ off[n]=length; add(n+' 0 obj\n'); };
  add('%PDF-1.3\n');
  startObj(1); add('<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
  startObj(2); add('<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');
  startObj(3); add(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pw.toFixed(2)} ${ph.toFixed(2)}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>\nendobj\n`);
  startObj(4); add(`<< /Type /XObject /Subtype /Image /Width ${iw} /Height ${ih} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`); add(jpeg); add('\nendstream\nendobj\n');
  const content=`q ${dw.toFixed(2)} 0 0 ${dh.toFixed(2)} ${dx.toFixed(2)} ${dy.toFixed(2)} cm /Im0 Do Q\n`;
  startObj(5); add(`<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`);
  const xref=length;
  add('xref\n0 6\n0000000000 65535 f \n');
  for(let i=1;i<=5;i++) add(String(off[i]).padStart(10,'0')+' 00000 n \n');
  add(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`);
  const out=new Uint8Array(length); let p=0; for(const a of parts){ out.set(a,p); p+=a.length; }
  return out;
}
async function savePDF(){
  if(!DOC){ return; }
  const prevDark=darkBg;
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  // 印刷用に解像度を上げて純白背景で再描画（画面の物理解像度の EXPORT_SCALE 倍）
  let EXPORT_SCALE=3;
  const longSide=Math.max(cv.width, cv.height);
  if(longSide*EXPORT_SCALE>6000) EXPORT_SCALE=Math.max(1, Math.floor(6000/longSide)); // 出力長辺の上限でメモリ保護
  // iOS Safariはcanvas面積上限(約16.7Mpx)を超えると空画像になるため面積でも制限
  const MAX_AREA=16000000;
  while(EXPORT_SCALE>1 && cv.width*cv.height*EXPORT_SCALE*EXPORT_SCALE>MAX_AREA) EXPORT_SCALE--;
  const prevW=cv.width, prevH=cv.height;
  const prevVS=view.scale, prevOX=view.ox, prevOY=view.oy;
  let durl=null, jurl=null, isLandscape=true, tmpW=0, tmpH=0;
  try{
    cv.width=prevW*EXPORT_SCALE; cv.height=prevH*EXPORT_SCALE;
    ov.width=prevW*EXPORT_SCALE; ov.height=prevH*EXPORT_SCALE;
    view.scale*=EXPORT_SCALE; view.ox*=EXPORT_SCALE; view.oy*=EXPORT_SCALE;
    exportScale=EXPORT_SCALE;
    pdfExportBg=true; darkBg=false; draw(); drawOverlay();
    const tmp=document.createElement('canvas'); tmp.width=cv.width; tmp.height=cv.height;
    const t=tmp.getContext('2d');
    t.fillStyle='#ffffff'; t.fillRect(0,0,tmp.width,tmp.height);   // 純白の下地
    t.drawImage(cv,0,0); t.drawImage(ov,0,0);      // 図面＋寸法オーバーレイを合成
    tmpW=tmp.width; tmpH=tmp.height; isLandscape=tmpW>=tmpH;
    if(isIOS) jurl=tmp.toDataURL('image/jpeg',0.92);       // iOSはPDF直接生成用にJPEG
    else durl=tmp.toDataURL('image/png');                  // 可逆PNGで白背景・線をシャープに
  }finally{
    // 例外時も解像度・ビュー・背景・線幅を必ず元に戻す
    pdfExportBg=false; darkBg=prevDark; exportScale=1;
    cv.width=prevW; cv.height=prevH; ov.width=prevW; ov.height=prevH;
    view.scale=prevVS; view.ox=prevOX; view.oy=prevOY;
    if(prevDark) setBg(true); else { draw(); drawOverlay(); }
  }
  if(isIOS){
    // iOS Safariは非表示iframeのprint()が動かないため、PDFを直接生成してダウンロード
    if(!jurl){ alert('PDF用画像の生成に失敗しました'); return; }
    const bytes=buildPDF(dataURLtoBytes(jurl), tmpW, tmpH);
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=pdfName();
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),10000);
    setHud('PDFを保存しました');
    return;
  }
  if(!durl) return;
  // ブラウザの印刷を開く（送信先で「PDFに保存」を選んで保存）
  printDrawing(durl, isLandscape);
}
// 図面画像をブラウザの印刷機能に渡す（印刷ダイアログ → 送信先「PDFに保存」）
function printDrawing(durl, isLandscape){
  const old=document.getElementById('print-frame');
  if(old) old.remove();
  const f=document.createElement('iframe');
  f.id='print-frame';
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden';
  document.body.appendChild(f);
  const fname=pdfName().replace(/\.pdf$/i,'');     // 例: 意匠図面一式たつの [11]_260619
  const d=f.contentDocument||f.contentWindow.document;
  d.open();
  d.write('<!doctype html><html><head><meta charset="utf-8">'
    +'<style>@page{size:A4 '+(isLandscape?'landscape':'portrait')+';margin:8mm;}'
    +'html,body{margin:0;padding:0;background:#fff;}'
    +'img{display:block;width:100%;height:100vh;object-fit:contain;}</style></head>'
    +'<body><img id="pimg" src="'+durl+'"></body></html>');
  d.close();
  // 印刷ダイアログの初期ファイル名は最上位ドキュメントの title が使われるため一時的に差し替える
  const saved=[];
  const setTitle=doc=>{ try{ if(doc){ saved.push([doc,doc.title]); doc.title=fname; } }catch(e){} };
  setTitle(document); setTitle(d);
  try{ if(window.top && window.top!==window) setTitle(window.top.document); }catch(e){}
  const restore=()=>saved.forEach(([doc,t])=>{ try{ doc.title=t; }catch(e){} });
  const img=d.getElementById('pimg');
  const go=()=>{
    try{
      f.contentWindow.focus();
      f.contentWindow.onafterprint=()=>setTimeout(restore,300);
      f.contentWindow.print();
      setTimeout(restore,60000);   // 保険：タイトル戻し忘れ防止
    }catch(e){ restore(); alert('印刷を開始できませんでした: '+(e.message||e)); }
  };
  if(img.complete && img.naturalWidth) setTimeout(go,120);
  else { img.onload=()=>setTimeout(go,120); img.onerror=()=>{ restore(); alert('印刷用画像の生成に失敗しました'); }; }
}
document.getElementById('btn-pdf').onclick=savePDF;
// レイヤ設定モーダル
const layerModal=document.getElementById('layerModal');
document.getElementById('btn-layer').onclick=()=>{ layerModal.hidden=false; };
document.getElementById('btn-layer-top').onclick=()=>{ layerModal.hidden=false; };
document.getElementById('layerModalClose').onclick=()=>{ layerModal.hidden=true; };
layerModal.addEventListener('click',e=>{ if(e.target===layerModal) layerModal.hidden=true; });  // 背景クリックで閉じる
document.getElementById('layer-all-on').onclick=()=>setAllLayers(true);
document.getElementById('layer-all-off').onclick=()=>setAllLayers(false);
window.addEventListener('keydown',e=>{
  const inField = e.target && (e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA');
  if(e.key==='Escape'){
    if(inField){ e.target.blur(); return; }   // 入力欄でのEscは取消(undo)を発動させない
    if(!layerModal.hidden){ layerModal.hidden=true; return; }
    if(toolMode==='text-move' && textMoveTarget){ textMoveTarget=null; setHud('選択を解除しました'); draw(); return; }
    undoLastAction();
    return;
  }
});

// マウス: パン・寸法点クリック・矩形拡大
let dragging=false, last=null, downPos=null, downMoved=false;
// 矩形拡大（左右同時押し）
let boxZoom=null; // {startPx, startPy, curPx, curPy} canvasピクセル座標
cv.addEventListener('contextmenu',e=>e.preventDefault()); // 右クリックメニュー抑止
cv.addEventListener('mousedown',e=>{ if(!DOC)return;
  // 左右同時押し検出: buttons bit0=左, bit1=右, bit2=中
  if(boxZoom && (e.buttons&3)===3) return; // 既にboxZoom中
  if((e.buttons&3)===3 || (dragging && e.button===2) || (e.button===0 && e.buttons&2)){
    // 左右同時押し→矩形拡大開始
    e.preventDefault();
    dragging=false;
    const [px,py]=toCanvas(e.clientX,e.clientY);
    boxZoom={startPx:px,startPy:py,curPx:px,curPy:py};
    return;
  }
  if(boxZoom) return;
  if(e.button===2){ e.preventDefault(); return; } // 右ボタン単独は無視
  dragging=true; last=[e.clientX,e.clientY]; downPos=[e.clientX,e.clientY]; downMoved=false;
});
window.addEventListener('mouseup',e=>{
  if(boxZoom){
    // 矩形拡大完了
    const bz=boxZoom; boxZoom=null;
    const bw=Math.abs(bz.curPx-bz.startPx), bh=Math.abs(bz.curPy-bz.startPy);
    if(bw>5 && bh>5){
      // 左上→右下ドラッグ = 拡大、右下→左上ドラッグ = 全体表示（Jwwcad式）
      if(bz.curPx > bz.startPx && bz.curPy > bz.startPy){
        // 拡大
        const x1=bz.startPx, y1=bz.startPy, x2=bz.curPx, y2=bz.curPy;
        const wcx=(((x1+x2)/2)-view.ox)/view.scale;
        const wcy=(view.oy-((y1+y2)/2))/view.scale;
        const newScale=Math.min(cv.width/(x2-x1), cv.height/(y2-y1))*view.scale;
        view.scale=newScale;
        view.ox=cv.width/2 - wcx*view.scale;
        view.oy=cv.height/2 + wcy*view.scale;
      } else {
        // 全体表示
        fit();
      }
    }
    draw();
    return;
  }
  // 寸法ツール有効＋ほぼ動いていなければ「クリック」とみなし点を指定
  if(dragging && DOC && excelMode && !downMoved){ const [px,py]=toCanvas(e.clientX,e.clientY); handleExcelClick(px,py); }
  else if(dragging && DOC && toolMode==='line-del' && !downMoved){ const [px,py]=toCanvas(e.clientX,e.clientY); handleLineDelClick(px,py); }
  else if(dragging && DOC && toolMode==='text-move' && !downMoved){ const [px,py]=toCanvas(e.clientX,e.clientY); handleTextMoveClick(px,py); }
  else if(dragging && DOC && (toolMode==='line'||toolMode==='single-line'||toolMode==='xy'||toolMode==='diag') && !downMoved){ const [px,py]=toCanvas(e.clientX,e.clientY); placePoint(px,py); }
  dragging=false;
});
window.addEventListener('mousemove',e=>{ if(!DOC)return;
  if(boxZoom){
    const [px,py]=toCanvas(e.clientX,e.clientY);
    boxZoom.curPx=px; boxZoom.curPy=py;
    draw(); // 矩形描画は draw 内で
    // オーバーレイに矩形を描画
    drawOverlay();
    const x1=Math.min(boxZoom.startPx,boxZoom.curPx), y1=Math.min(boxZoom.startPy,boxZoom.curPy);
    const x2=Math.max(boxZoom.startPx,boxZoom.curPx), y2=Math.max(boxZoom.startPy,boxZoom.curPy);
    octx.save(); octx.strokeStyle='#f0a93b'; octx.lineWidth=2; octx.setLineDash([6,3]);
    octx.strokeRect(x1,y1,x2-x1,y2-y1); octx.restore();
    return;
  }
  if(dragging){
    const r=cv.getBoundingClientRect(), dpr=cv.width/r.width;
    view.ox += (e.clientX-last[0])*dpr; view.oy += (e.clientY-last[1])*dpr;
    last=[e.clientX,e.clientY];
    if(downPos && Math.hypot(e.clientX-downPos[0],e.clientY-downPos[1])>4) downMoved=true;
    draw(); return;
  }
  if(excelMode){
    const [px,py]=toCanvas(e.clientX,e.clientY);
    cv.style.cursor=textHitAt(px,py)?'copy':'default';
  }else if(toolMode==='line'||toolMode==='single-line'||toolMode==='xy'||toolMode==='diag'){
    const [px,py]=toCanvas(e.clientX,e.clientY);
    hover=(toolMode==='line'||toolMode==='single-line'||pend.length<2)?snapAt(px,py):freeAt(px,py);
    drawOverlay();
  }
});

// タッチ（iPad）: ペンシル/指1本=寸法点指定、指2本=拡大＋移動
// パンは指2本のみ。ペンシルと指1本はパンせず、離した位置に点を指定する。
let gesture=null, pinch=null, ptLast=null, pencilPos=null;
const isPencil=t=>t.touchType==='stylus';
function startPinch(a,b){               // a,b: canvasピクセル座標
  const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
  pinch={ d0:Math.hypot(a[0]-b[0],a[1]-b[1])||1, scale0:view.scale, wx:(mx-view.ox)/view.scale, wy:(view.oy-my)/view.scale };
}
function aimPoint(t){                    // 点指定のプレビュー（スナップ表示）
  const [px,py]=toCanvas(t.clientX,t.clientY);
  ptLast={clientX:t.clientX, clientY:t.clientY};
  pencilPos=[px,py];
  if(excelMode){ cv.style.cursor=textHitAt(px,py)?'copy':'default'; }
  else if(toolMode){ hover=(toolMode==='line'||toolMode==='single-line'||pend.length<2)?snapAt(px,py):freeAt(px,py); }
  drawOverlay();
}
function startSingle(t){
  gesture='point';
  aimPoint(t);
}
cv.addEventListener('touchstart',e=>{ if(!DOC)return;
  const touches=[...e.touches];
  const pencil=touches.find(isPencil);
  const fingers=touches.filter(t=>!isPencil(t));
  if(pencil){ e.preventDefault(); pencilPos=toCanvas(pencil.clientX,pencil.clientY); startSingle(pencil); return; }  // ペンシル優先
  if(fingers.length>=2){ e.preventDefault(); gesture='pinch'; hover=null;  // 指2本＝拡大＋移動
    startPinch(toCanvas(fingers[0].clientX,fingers[0].clientY), toCanvas(fingers[1].clientX,fingers[1].clientY)); return; }
  if(fingers.length===1){ e.preventDefault(); startSingle(fingers[0]); }              // 指1本
},{passive:false});
cv.addEventListener('touchmove',e=>{ if(!DOC)return;
  const touches=[...e.touches];
  const pencil=touches.find(isPencil);
  const fingers=touches.filter(t=>!isPencil(t));
  if(pencil){ pencilPos=toCanvas(pencil.clientX,pencil.clientY); }  // ペンシル位置を常に追跡
  if(gesture==='pinch' && !pencil && fingers.length>=2){ e.preventDefault();
    const a=toCanvas(fingers[0].clientX,fingers[0].clientY), b=toCanvas(fingers[1].clientX,fingers[1].clientY);
    const d=Math.hypot(a[0]-b[0],a[1]-b[1])||1, mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
    view.scale=pinch.scale0*(d/pinch.d0);                         // 指間距離の比で拡大
    view.ox=mx - pinch.wx*view.scale; view.oy=my + pinch.wy*view.scale; // 固定点を現在の中点へ
    draw(); return;
  }
  if(gesture==='point'){ e.preventDefault();                      // ペンシル/指1本: 移動せず照準のみ
    const t=pencil||fingers[0]; if(t) aimPoint(t); return;
  }
},{passive:false});
cv.addEventListener('touchend',e=>{ if(!DOC){ gesture=null; return; }
  if(gesture==='point' && excelMode && ptLast){
    const [px,py]=toCanvas(ptLast.clientX, ptLast.clientY); handleExcelClick(px,py);
  }else if(gesture==='point' && toolMode && ptLast){                    // 離した位置に点を確定＝選択
    const [px,py]=toCanvas(ptLast.clientX, ptLast.clientY); placePoint(px,py);
  }
  if(![...e.touches].find(isPencil)){ pencilPos=null; drawOverlay(); }  // ペンシルが離れたらカーソル消去
  if(e.touches.length===0){ gesture=null; pinch=null; ptLast=null; }
  else {                                                          // 残った接触で継続判定
    const touches=[...e.touches];
    const fingers=touches.filter(t=>!isPencil(t));
    if(!touches.find(isPencil) && fingers.length>=2){ gesture='pinch'; hover=null;
      startPinch(toCanvas(fingers[0].clientX,fingers[0].clientY), toCanvas(fingers[1].clientX,fingers[1].clientY));
    } else { gesture=null; }                                      // 1本残り等は次のtouchstartで判定
  }
},{passive:false});
// ズーム
cv.addEventListener('wheel',e=>{ if(!DOC)return; e.preventDefault();
  const r=cv.getBoundingClientRect(), dpr=cv.width/r.width;
  const mx=(e.clientX-r.left)*dpr, my=(e.clientY-r.top)*dpr;
  zoomAt(mx,my, e.deltaY<0?1.12:0.893);
},{passive:false});
function zoomAt(px,py,f){
  const wx=(px-view.ox)/view.scale, wy=(view.oy-py)/view.scale;
  view.scale*=f;
  view.ox=px - wx*view.scale; view.oy=py + wy*view.scale;
  draw();
}

function resize(){
  const r=cv.getBoundingClientRect(); const dpr=window.devicePixelRatio||1;
  const w=Math.max(1,Math.round(r.width*dpr)), h=Math.max(1,Math.round(r.height*dpr));
  cv.width=w; cv.height=h; ov.width=w; ov.height=h;
}
window.addEventListener('resize',()=>{ resize(); if(DOC) draw(); });
resize();

document.getElementById('sidebarToggle').onclick=()=>{
  document.body.classList.toggle('sidebar-open');
  setTimeout(()=>{ resize(); if(DOC) draw(); },260);
};

const fsBtn=document.getElementById('fullscreenToggle');
fsBtn.onclick=()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }else{
    document.exitFullscreen();
  }
};
document.addEventListener('fullscreenchange',()=>{
  const on=!!document.fullscreenElement;
  fsBtn.classList.toggle('on', on);
  fsBtn.title=on?'全画面を解除':'全画面表示';
  setTimeout(()=>{ resize(); if(DOC) draw(); },100);
});
